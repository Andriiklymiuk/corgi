# Staged for submission to https://github.com/pkgxdev/pantry
# Target path in pantry repo: projects/github.com/Andriiklymiuk/corgi/package.yml
#
# After merge, users get:
#   pkgx corgi run
#   pkgx install corgi

distributable:
  url: https://github.com/Andriiklymiuk/corgi/archive/refs/tags/v{{version}}.tar.gz
  strip-components: 1

versions:
  github: Andriiklymiuk/corgi
  strip: /v/

provides:
  - bin/corgi

dependencies:
  go.dev: ^1.25

build:
  script: |
    go build -ldflags "-s -w" -o "{{prefix}}/bin/corgi" .
    chmod -R u+w "$GOPATH" "$GOCACHE" 2>/dev/null || true
    rm -rf "$GOPATH" "$GOCACHE"
  env:
    GOPATH: ${{prefix}}/gopath
    GOCACHE: ${{prefix}}/gocache
    CGO_ENABLED: 0
    linux:
      GO_LDFLAGS:
        - -buildmode=pie

test:
  script: |
    corgi -h

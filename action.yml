name: Setup corgi
description: Install corgi from a verified release archive and expose what a CI cache should persist.
author: Andrii Klymiuk

branding:
  icon: box
  color: orange

inputs:
  version:
    description: >-
      corgi version to install, without the leading v (e.g. 1.20.13). Omit to
      take the latest release. Pinning keeps a workflow reproducible.
    required: false
    default: ""
  working-directory:
    description: Directory holding corgi-compose.yml. Cache outputs are derived from it.
    required: false
    default: "."

outputs:
  version:
    description: The corgi version that was installed.
    value: ${{ steps.setup.outputs.version }}
  cache-paths:
    description: >-
      Newline-separated directories worth caching, derived from every service's
      beforeStart cacheKey. Pass straight to actions/cache's path input.
    value: ${{ steps.setup.outputs.cache-paths }}
  cache-key:
    description: >-
      Cache key that changes whenever any cacheKey file changes. Pass straight
      to actions/cache's key input.
    value: ${{ steps.setup.outputs.cache-key }}
  cache-groups:
    description: >-
      The same plan split per ecosystem, as JSON: a list of
      {id, key, paths, pathsText}. One actions/cache step per entry keeps a
      change to one language's lockfile from evicting every other language's
      packages. pathsText is newline-joined because an Actions expression
      cannot build that string itself.
    value: ${{ steps.setup.outputs.cache-groups }}

runs:
  using: composite
  steps:
    - id: setup
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        REQUESTED_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        # --proto '=https' refuses any non-https URL, including one arrived at
        # through a redirect, so a hijacked redirect cannot downgrade the
        # transport. --tlsv1.2 rules out obsolete TLS.
        curl_opts=(--fail --silent --show-error --location --proto '=https' --tlsv1.2)

        version="${REQUESTED_VERSION#v}"
        if [ -z "$version" ]; then
          version="$(curl "${curl_opts[@]}" \
            https://api.github.com/repos/Andriiklymiuk/corgi/releases/latest \
            | jq -r .tag_name)"
          version="${version#v}"
        fi

        case "$(uname -s)" in
          Linux) os=linux ;;
          Darwin) os=darwin ;;
          *) echo "::error::corgi action supports Linux and macOS runners, not $(uname -s)"; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64|amd64) arch=amd64 ;;
          aarch64|arm64) arch=arm64 ;;
          *) echo "::error::unsupported architecture $(uname -m)"; exit 1 ;;
        esac

        archive="corgi_${version}_${os}_${arch}.tar.gz"
        base="https://github.com/Andriiklymiuk/corgi/releases/download/v${version}"
        tmp="$(mktemp -d)"

        curl "${curl_opts[@]}" -o "$tmp/$archive" "$base/$archive"
        curl "${curl_opts[@]}" -o "$tmp/checksums.txt" "$base/checksums.txt"

        # Verify before anything is executed: the release publishes checksums,
        # so a tampered or truncated download fails here rather than running.
        (
          cd "$tmp"
          if command -v sha256sum >/dev/null 2>&1; then
            grep " ${archive}\$" checksums.txt | sha256sum --check --status -
          else
            grep " ${archive}\$" checksums.txt | shasum --algorithm 256 --check --status -
          fi
        ) || { echo "::error::checksum mismatch for $archive — refusing to install"; exit 1; }

        tar -xzf "$tmp/$archive" -C "$tmp" corgi
        sudo install -m 0755 "$tmp/corgi" /usr/local/bin/corgi
        rm -rf "$tmp"

        installed="$(corgi version --json | jq -r .version)"
        echo "version=$installed" >> "$GITHUB_OUTPUT"
        echo "corgi $installed (verified against checksums.txt)"

        # Only available once a compose file exists; installing corgi before
        # the checkout should still succeed here.
        if ls ./*corgi-compose.yml >/dev/null 2>&1 || [ -f corgi-compose.yml ]; then
          {
            echo "cache-paths<<CORGI_ACTION_EOF"
            corgi cache paths
            echo "CORGI_ACTION_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "cache-key=$(corgi cache paths --key)" >> "$GITHUB_OUTPUT"
          echo "cache-groups=$(corgi cache paths --json | jq -c '.groups // []')" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::no corgi-compose.yml in ${{ inputs.working-directory }} yet, so no cache outputs"
        fi

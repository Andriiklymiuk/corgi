sonar.projectKey=Andriiklymiuk_corgi
sonar.organization=corgi
sonar.projectName=corgi
sonar.sourceEncoding=UTF-8

sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**,**/testdata/**,corgi_vscode_extension/**,corgi_services/**,templates/**,docs/**,packaging/**,plugins/**,resources/**,dump.bak,install.sh,install.ps1,Dockerfile,**/*.md

sonar.go.coverage.reportPaths=coverage.out
# Coverage exclusions: code that cannot be unit-tested without major DI refactor.
# - cobra Run handlers that wire signal handlers, os.Exit, interactive prompts, or long-running goroutines.
# - thin wrappers around exec.Command for docker/git/make subprocess CLIs.
# - syscall-bound process group / interrupt helpers (proc_default, sendInterrupt_default).
# - long-running infra (AWS VPN spinner loop, DockerInit retry loop).
sonar.coverage.exclusions=**/*_test.go,\
main.go,\
cmd/docs.go,cmd/completion.go,cmd/upgrade.go,\
cmd/root.go,cmd/pull.go,cmd/list.go,\
cmd/db.go,cmd/doctor.go,cmd/fork.go,cmd/script.go,\
cmd/clean.go,\
utils/art/**,utils/messages.go,utils/getRandomQuote.go,\
utils/proc_default.go,utils/proc_windows.go,\
utils/sendInterrupt_default.go,utils/sendInterrupt_windows.go,\
utils/startCommands.go,\
utils/storage.go,\
utils/instructionsToInstallTools.go,\
utils/examples.go,\
utils/prompt.go

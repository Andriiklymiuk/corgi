name: Create release

on:
  push:
    branches:
      - "main"

jobs:
  gate:
    # Reuse the CI workflow as the gate: lint + test must pass before release.
    # Pass only the one secret the gate needs (GITHUB_TOKEN is auto-provided to
    # reusable workflows) — never `secrets: inherit`.
    uses: ./.github/workflows/test.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  goreleaser:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable
          cache: true

      - name: Get version and add it to GITHUB_ENV
        run: make getActionVersion

      - name: Extract APP_VERSION and Create Tag
        id: create-tag
        run: |
          TAG="v${VERSION}"

          echo "VERSION: ${VERSION}"
          echo "TAG: $TAG"

          # Check if the tag exists
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${GITHUB_TOKEN}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")

          if [ "$HTTP_STATUS" -ne 200 ]
          then
            echo "Tag does not exist, creating new tag"
            git config --global user.email "action@github.com"
            git config --global user.name "GitHub Action"
            git tag "$TAG"
            git push origin "$TAG"
            echo "TAG_EXISTS=false" >> "$GITHUB_ENV"
          else
            echo "Tag already exists"
            echo "TAG_EXISTS=true" >> "$GITHUB_ENV"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - run: git fetch --force --tags

      - name: Run GoReleaser
        if: env.TAG_EXISTS == 'false'
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # The GitHub Action is consumed as andriiklymiuk/corgi@v1, so that tag has
      # to follow each release or callers would be stuck on whatever it pointed
      # at when they wrote their workflow. Moving a major tag is the convention
      # actions/checkout and friends use.
      - name: Move the major tag to this release
        if: env.TAG_EXISTS == 'false'
        run: |
          TAG="v${VERSION}"
          MAJOR="v${VERSION%%.*}"
          echo "pointing $MAJOR at $TAG"
          git tag --force "$MAJOR" "$TAG"
          git push --force origin "$MAJOR"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

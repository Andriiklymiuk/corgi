name: CI

on:
  pull_request:
    branches: [main]
  # Pushes to main run this via release.yml, which invokes it as a gate —
  # no separate push trigger, or every push would run CI (and Sonar) twice.
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: false

jobs:
  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
          echo "gofmt: all files clean"

  test:
    name: Test + Coverage + Sonar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable
          cache: true

      - name: Run tests with coverage
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic -timeout 5m

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Coverage floor gate
        run: ./scripts/coverage-floor.sh coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: SonarCloud Scan
        if: github.repository == 'Andriiklymiuk/corgi'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow release.yml to invoke this workflow as a gate.
  workflow_call:

jobs:
  lint:
    name: Lint + gofmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
          echo "gofmt: all files clean"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.2

  test:
    name: Test + Coverage + Sonar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run tests with coverage
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic -timeout 5m

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Coverage floor gate
        run: ./scripts/coverage-floor.sh coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: SonarCloud Scan
        if: github.repository == 'Andriiklymiuk/corgi'
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

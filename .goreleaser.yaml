# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
before:
  hooks:
    - go mod tidy
    # Generate shell completions for bundling into release archive + brew.
    # Built once via `go run .` so we don't depend on the release binary's
    # platform. Banner is suppressed because main.canShowWelcomeMessages
    # excludes the `completion` subcommand.
    - mkdir -p completions
    - sh -c "go run . completion bash > completions/corgi.bash"
    - sh -c "go run . completion zsh  > completions/corgi.zsh"
    - sh -c "go run . completion fish > completions/corgi.fish"
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
archives:
  - files:
      - completions/*
checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
# .goreleaser.yaml
brews:
  - name: corgi
    homepage: https://github.com/Andriiklymiuk/corgi
    description: "Command line interface for database configurations and other useful things, written in Go"
    repository:
      owner: Andriiklymiuk
      name: homebrew-tools
    # Install shell completions alongside the binary so `brew install corgi`
    # gives users tab-completion out of the box (zsh users may need
    # `compinit` once; brew bash users need bash-completion@2 installed).
    extra_install: |
      bash_completion.install "completions/corgi.bash" => "corgi"
      zsh_completion.install  "completions/corgi.zsh"  => "_corgi"
      fish_completion.install "completions/corgi.fish"
    caveats: |
      Shell tab-completion installed for bash, zsh, fish:
        corgi run --services <TAB>      # services from corgi-compose.yml
        corgi run --dbServices <TAB>    # db_services
        corgi script -n <TAB>           # script names per service
        corgi tunnel <TAB>              # tunnelable services

      zsh users — if `<TAB>` shows files instead of names, your shell
      isn't loading brew's site-functions. Add this to ~/.zshrc BEFORE
      `compinit` (one-time, fixes all brew-installed completions):

        FPATH="#{HOMEBREW_PREFIX}/share/zsh/site-functions:$FPATH"
        autoload -Uz compinit && compinit

      Then: `rm -f ~/.zcompdump* && exec zsh`

      What's new:
        https://github.com/Andriiklymiuk/corgi/releases/tag/v#{version}
